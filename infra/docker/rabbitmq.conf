# RabbitMQ Configuration
# Pre-configured exchanges and queues for the e-commerce microservices

# Default user credentials are set in docker-compose.yml (guest/guest)

# This file configures RabbitMQ server settings
# Queue/exchange definitions are in definitions.json

listeners.tcp.default = 5672
management.tcp.port = 15672

# Enable management plugin
management.load_definitions = /etc/rabbitmq/definitions.json

# Message TTL defaults
consumer_timeout = 900000

# Enable dead letter exchange support (configured in definitions.json)
